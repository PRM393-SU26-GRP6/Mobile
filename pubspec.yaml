name: exe101
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  #state management
  get: ^4.6.5

  #storage
  sqflite: ^2.2.8+4
  shared_preferences: ^2.1.4
  flutter_secure_storage: ^9.2.2

  # network
  dio: ^5.8.0+1
  connectivity_plus: ^5.0.2

  # environment
  envied: ^1.1.1

  # media
  image_picker: ^1.1.2
  
  # utils
  uuid: ^4.5.1

  # UI 
  fluttertoast: ^8.2.12

  # utils
  url_launcher: ^6.2.1
  qr_flutter: ^4.1.0
  webview_flutter: ^4.4.2

  path: ^1.8.3
  intl: ^0.18.1
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1
  flutter_launcher_icons: ^0.14.4
  signalr_netcore: ^1.4.4
  web: ^1.1.1
  flutter_map: ^8.3.1
  latlong2: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  envied_generator: ^1.1.1
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/  
    - assets/icons/
    - assets/fonts/
    - assets/lotties/
    - assets/animations/
    - assets/sounds/
